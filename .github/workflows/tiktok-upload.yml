name: TikTok Auto Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # خطوة الكاش الذكية
      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: node_modules
          # بنستخدم محتوى package.json كمفتاح للكاش
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        # هاي الخطوة رح تشتغل "فقط" إذا الكاش مش موجود
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      - name: Run TikTok Script
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node upload.js

      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error-screenshot.png
