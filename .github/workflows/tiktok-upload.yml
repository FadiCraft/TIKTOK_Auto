name: TikTok Auto Upload System

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'  # كل 6 ساعات

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg yt-dlp
          yt-dlp --version
          ffmpeg -version

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
          npm install --no-audit --no-fund
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES_ACCOUNT1: ${{ secrets.TIKTOK_COOKIES_ACCOUNT1 }}
          TIKTOK_COOKIES_ACCOUNT2: ${{ secrets.TIKTOK_COOKIES_ACCOUNT2 }}
          PROXY_URL: ${{ secrets.PROXY_URL }}  # اختياري: للوكيل
        run: node tiktok_uploader.js

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-execution-report
          path: |
            *.png
            published_history.json
          retention-days: 5
