name: TikTok Auto Upload System

on:
  workflow_dispatch:  # يمكنك تشغيله يدوياً من قائمة Actions
  # schedule:  # اختياري: تشغيل تلقائي كل 6 ساعات
  #   - cron: '*/360 * * * *'

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg yt-dlp
          # تأكيد تثبيت yt-dlp
          yt-dlp --version

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
          npm install --no-audit --no-fund
          # تثبيت متصفح Chrome يدوياً لـ Puppeteer
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES_ACCOUNT1: ${{ secrets.TIKTOK_COOKIES_ACCOUNT1 }}
          TIKTOK_COOKIES_ACCOUNT2: ${{ secrets.TIKTOK_COOKIES_ACCOUNT2 }}
        run: node tiktok_uploader.js

      - name: Upload Results & Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-execution-report
          path: |
            *.png
            published_history.json
          retention-days: 5
