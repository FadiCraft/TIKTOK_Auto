name: TikTok Auto Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # هذا السطر يفعل التخزين المؤقت لتسريع التنصيب

      - name: Install Dependencies
        # إضافة --prefer-offline تجعل npm يبحث عن المكتبات في الكاش أولاً
        run: npm install --prefer-offline --no-audit

      - name: Run Script
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node upload.js

      - name: Upload Screenshot on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error-screenshot.png
