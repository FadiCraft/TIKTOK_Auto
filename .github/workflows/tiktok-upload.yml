name: TikTok Auto Upload System

on:
  workflow_dispatch:
  # يمكنك إضافة تشغيل تلقائي كل 6 ساعات مثلاً
  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install NPM Dependencies
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          # إذا كنت تستخدم اليوتيوب أضف الرموز الخاصة به هنا أيضاً
        run: node upload.js

      - name: Save History Changes
        if: success()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add history.json
          git commit -m "Update video history [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Results & Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report
          path: |
            final-result.png
            error-screenshot.png
            history.json
          retention-days: 5
