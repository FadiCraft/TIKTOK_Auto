name: TikTok Auto Upload System

on:
  workflow_dispatch:

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
          npm install --no-audit --no-fund
          # تثبيت المتصفح يدوياً لضمان عدم حدوث Error
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node upload.js

      - name: Upload Results & Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-execution-report
          path: |
            final-result.png
            error-screenshot.png
          retention-days: 5
