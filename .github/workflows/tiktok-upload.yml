name: TikTok Auto Upload System

on:
  workflow_dispatch: # تشغيل يدوي

permissions:
  contents: write # للسماح بتحديث ملف history.json

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip curl
          # تثبيت yt-dlp ومكتبات فك تشفير البيانات (Brotli ضرورية لتجنب خطأ JSON)
          python3 -m pip install --upgrade pip
          pip3 install --upgrade yt-dlp requests Brotli certifi
          
          # تثبيت أداة yt-dlp كأمر نظام
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install NPM Dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true' # تسريع التثبيت بمنع تحميل المتصفح المدمج
        run: |
          npm install --no-audit --no-fund
          # تحميل المتصفح المناسب يدوياً مرة واحدة فقط
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          TIKTOK_COOKIES2: ${{ secrets.TIKTOK_COOKIES2 }}
          TIKTOK_COOKIES3: ${{ secrets.TIKTOK_COOKIES3 }}
        run: node upload.js

      - name: Save History Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # التأكد من وجود ملف التاريخ
          if [ ! -f history.json ]; then echo "[]" > history.json; fi
          
          git add history.json
          git commit -m "Update video history [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload Artifacts (Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report
          path: |
            *.png
            history.json
          retention-days: 3
