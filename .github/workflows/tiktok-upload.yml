name: TikTok Hourly Auto Post

on:
  schedule:
    - cron: '0 0,8,16 * * *'   
  workflow_dispatch: # زر التشغيل اليدوي

permissions:
  contents: write

jobs:
  post_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip curl
          pip3 install --upgrade yt-dlp requests Brotli
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install NPM Packages
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer
          npx puppeteer browsers install chrome

      - name: Run Uploader Script
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          TIKTOK_COOKIES2: ${{ secrets.TIKTOK_COOKIES2 }}
        run: node upload.js

      - name: Save Upload History
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f history.json ]; then echo "{}" > history.json; fi
          git add history.json
          git commit -m "Update post history [skip ci]" || echo "No changes to history"
          git push origin main

      - name: Upload Screenshots for Debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-screenshots
          path: '*.png'
          retention-days: 3
