name: TikTok Auto Upload System

on:
  workflow_dispatch: # تشغيل يدوي
  # schedule:
  #   - cron: '0 */6 * * *' # اختياري: تشغيل كل 6 ساعات

permissions:
  contents: write # ضروري للسماح للـ Action بتحديث ملف history.json

jobs:
  upload_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          # تثبيت yt-dlp بأحدث نسخة
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          # تحديث الشهادات لضمان عمل التحميل بدون مشاكل SSL
          pip3 install --upgrade certifi

      - name: Install NPM Dependencies
        run: |
          npm install
          # تثبيت متصفح كروم لـ Puppeteer
          npx puppeteer browsers install chrome

      - name: Run TikTok Auto Uploader
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: node upload.js

      - name: Save History Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إنشاء الملف إذا لم يكن موجوداً لتجنب خطأ fatal: pathspec
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi
          
          git add history.json
          # سيقوم بالرفع فقط إذا كان هناك تغيير فعلي في الملف
          git commit -m "Update video history [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload Artifacts (Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-execution-report
          path: |
            *.png
            history.json
          retention-days: 3
