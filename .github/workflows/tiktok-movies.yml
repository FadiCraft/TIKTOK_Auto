name: TikTok Movies Screen Recorder

on:
  schedule:
    - cron: '0 */4 * * *'  # يعمل تلقائياً كل 4 ساعات
  workflow_dispatch: # زر التشغيل اليدوي

permissions:
  contents: write

jobs:
  movie_record_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Tools, Xvfb & Arabic Fonts
        run: |
          sudo apt-get update
          # تثبيت خادم الشاشة الافتراضية xvfb وأدوات الصوت لتصوير داخلي آمن
          sudo apt-get install -y ffmpeg xvfb xdotool pulseaudio fonts-kacst fonts-dejavu
          # تهيئة كرت الصوت الافتراضي لكي يلتقط الميكروفون الداخلي صوت الفيلم
          pulseaudio -D --exit-idle-time=-1 || true

      - name: Install NPM Packages
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth puppeteer
          npx puppeteer browsers install chrome

      - name: Run Recorder (Inside Virtual Screen)
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        # تشغيل المتصفح والـ FFmpeg معاً داخل الشاشة الوهمية بمقاسات عمودية جاهزة
        run: |
          xvfb-run --server-args="-screen 0 1080x1920x24" node upload.js

      - name: Save Upload History (Prevent Duplicates)
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f history.json ]; then echo '{"posted":[]}' > history.json; fi
          git add history.json
          git commit -m "Update movie post history [skip ci]" || echo "No changes to history"
          git push origin main

      - name: Upload Recorded Video & Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            *.png
            tiktok_ready.mp4
          retention-days: 3
