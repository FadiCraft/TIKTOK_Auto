name: Run TikTok Movie Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          # 🟢 إجبار الحزم على التثبيت وتخطي تعارض الإصدارات القديمة
          npm install puppeteer-screen-recorder --legacy-peer-deps
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Run Bot and Capture
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          xvfb-run --server-args="-screen 0 1080x1920x24" node upload.js

      # 🎬 خطوة رفع الفيديو النهائي المجهز للتيك توك
      - name: Upload TikTok Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tiktok-movie-video
          path: tiktok_ready.mp4
